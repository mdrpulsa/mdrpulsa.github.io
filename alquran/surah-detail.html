<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Quran Digital - Detail Surah</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri&display=swap">
    <style>
        :root {
            --primary-color: #008ca7;
            --secondary-color: #e6f7fa;
            --accent-color: #005f73;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
        }
        
        @font-face {
            font-family: 'LPMQ';
            src: url('https://equran.id/font/LPMQ.ttf') format('truetype');
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            padding-bottom: 20px;
        }
        
        .font-quran {
            font-family: 'LPMQ', 'Amiri', serif;
        }
        
        .verse-card {
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            background-color: white;
        }
        
        .verse-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }
        
        .verse-card.active {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 140, 167, 0.1);
        }
        
        .verse-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--secondary-color);
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .verse-card.active .verse-number {
            background-color: var(--primary-color);
            color: white;
        }
        
        .surah-header {
            border-radius: 15px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .surah-header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='25' fill='none' stroke='rgba(255,255,255,0.15)' stroke-width='0.5'/%3E%3C/svg%3E");
            background-size: 30px 30px;
            opacity: 0.5;
        }
        
        .surah-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .surah-info {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 15px;
        }
        
        .arabic-text {
            font-size: 1.8rem;
            text-align: right;
            line-height: 2.5;
            margin-bottom: 15px;
        }
        
        .translation-text {
            color: #555;
            font-size: 1rem;
            line-height: 1.6;
        }
        
        .latin-text {
            color: #666;
            font-style: italic;
            font-size: 0.95rem;
            margin-bottom: 10px;
        }
        
        .audio-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        
        .audio-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .audio-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        
        .verse-audio-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 1.5rem;
            transition: all 0.3s ease;
            padding: 5px;
            position: relative;
        }
        
        .verse-audio-btn:hover {
            color: var(--accent-color);
            transform: scale(1.1);
        }
        
        .verse-audio-btn.playing {
            color: var(--accent-color);
        }
        
        .bookmark-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 1.5rem;
            transition: all 0.3s ease;
            padding: 5px;
        }
        
        .bookmark-btn:hover {
            color: var(--accent-color);
            transform: scale(1.1);
        }
        
        .bookmark-btn.active {
            color: #ff6b6b;
        }
        
        .search-box {
            border-radius: 25px;
            border: 1px solid #ddd;
            padding: 10px 20px 10px 45px;
            width: 100%;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 140, 167, 0.2);
        }
        
        .search-icon {
            position: absolute;
            left: 20px;
            top: 12px;
            color: #999;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .back-btn {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            color: var(--accent-color);
            transform: translateX(-5px);
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--primary-color);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s;
            max-width: 300px;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        
        .container-custom {
            max-width: 500px;
            margin: 0 auto;
            padding: 15px;
        }
        
        .playback-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .playback-btn {
            background-color: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .playback-btn:hover {
            background-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }
        
        @media (max-width: 576px) {
            .container-custom {
                padding: 10px;
            }
            
            .surah-header {
                padding: 15px;
            }
            
            .arabic-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container-custom">
        <!-- Back Button -->
        <a href="index.html" class="back-btn" id="backButton">
            <i class="bi bi-arrow-left me-2"></i> Kembali ke Daftar Surat
        </a>

        <!-- Surah Header Card -->
        <div class="surah-header">
            <h1 class="surah-title text-center" id="surahTitle">Memuat...</h1>
            <p class="surah-info text-center" id="surahInfo"></p>
            <div class="text-center mb-4">
                <p class="font-quran arabic-text mb-0" id="bismillah">
                    بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
                </p>
            </div>
            <div class="audio-controls">
                <button id="playButton" class="audio-btn">
                    <i class="bi bi-play-fill fs-4"></i>
                </button>
                <button id="resetButton" class="audio-btn">
                    <i class="bi bi-arrow-clockwise fs-4"></i>
                </button>
            </div>
            <div class="playback-controls">
                <button id="prevVerseBtn" class="playback-btn" title="Ayat sebelumnya">
                    <i class="bi bi-skip-backward-fill"></i>
                </button>
                <button id="nextVerseBtn" class="playback-btn" title="Ayat berikutnya">
                    <i class="bi bi-skip-forward-fill"></i>
                </button>
            </div>
        </div>

        <!-- Search Box -->
        <div class="position-relative">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="searchVerse" class="search-box" placeholder="Cari ayat...">
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center">
            <div class="loading-spinner"></div>
            <p class="text-muted mt-2">Memuat surah...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="alert alert-danger text-center d-none">
            <!-- Error message will appear here -->
        </div>

        <!-- Verses Container -->
        <div id="versesContainer" class="d-none">
            <!-- Verses will be populated here -->
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="audioPlayer" preload="none"></audio>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let currentSurah = null;
        let currentAudio = null;
        let currentVerseAudio = null;
        let isSurahPlaying = false;
        let currentVerseIndex = -1; // Untuk melacak ayat yang sedang diputar
        let isAutoPlayMode = false; // Mode autoplay ayat berurutan
        const audioPlayer = document.getElementById('audioPlayer');
        const playButton = document.getElementById('playButton');
        const resetButton = document.getElementById('resetButton');
        const prevVerseBtn = document.getElementById('prevVerseBtn');
        const nextVerseBtn = document.getElementById('nextVerseBtn');
        const searchVerse = document.getElementById('searchVerse');
        const versesContainer = document.getElementById('versesContainer');
        const loadingState = document.getElementById('loadingState');
        const errorState = document.getElementById('errorState');
        const backButton = document.getElementById('backButton');
        const bismillahElement = document.getElementById('bismillah');

        // Get surah ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const surahId = urlParams.get('id') || 1;

        // Fetch surah details
        async function fetchSurahDetails() {
            try {
                loadingState.classList.remove('d-none');
                errorState.classList.add('d-none');
                versesContainer.classList.add('d-none');
                versesContainer.innerHTML = '';

                const response = await fetch(`https://equran.id/api/v2/surat/${surahId}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                currentSurah = data.data;
                
                // Update UI
                document.getElementById('surahTitle').textContent = currentSurah.namaLatin;
                document.getElementById('surahInfo').textContent = 
                    `${currentSurah.tempatTurun} • ${currentSurah.jumlahAyat} Ayat • ${currentSurah.arti}`;
                
                // Hide Bismillah for Al-Fatihah
                if (currentSurah.nomor === 1) {
                    bismillahElement.style.display = 'none';
                } else {
                    bismillahElement.style.display = 'block';
                }

                renderVerses(currentSurah.ayat);
                setupAudioControls();

                // Scroll to specific verse if provided in URL
                const verseNumber = urlParams.get('verse');
                if (verseNumber) {
                    setTimeout(() => scrollToVerse(verseNumber), 100);
                }

                loadingState.classList.add('d-none');
                versesContainer.classList.remove('d-none');
            } catch (error) {
                console.error('Error fetching surah details:', error);
                loadingState.classList.add('d-none');
                errorState.classList.remove('d-none');
                errorState.innerHTML = `
                    <p class="mb-2">Gagal memuat data surah. Silakan coba lagi.</p>
                    <button onclick="fetchSurahDetails()" class="btn btn-primary btn-sm">Coba lagi</button>
                `;
            }
        }

        function renderVerses(verses) {
            if (!verses || verses.length === 0) {
                versesContainer.innerHTML = '<p class="text-center text-muted">Tidak ada ayat ditemukan.</p>';
                return;
            }
            
            versesContainer.innerHTML = verses.map((verse, index) => {
                const isBookmarked = checkIfBookmarked(currentSurah.nomor, verse.nomorAyat);
                return `
                    <div class="verse-card p-3" id="verse-${verse.nomorAyat}" data-verse-index="${index}">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div class="verse-number">
                                ${verse.nomorAyat}
                            </div>
                            <div class="font-quran arabic-text">
                                ${verse.teksArab}
                            </div>
                        </div>
                        <div class="mb-3">
                            <p class="latin-text">${verse.teksLatin}</p>
                            <p class="translation-text">${verse.teksIndonesia}</p>
                        </div>
                        <div class="d-flex justify-content-end gap-3">
                            <button onclick="playVerse(${verse.nomorAyat}, ${index})" class="verse-audio-btn" 
                                    data-verse="${verse.nomorAyat}" data-verse-index="${index}" 
                                    aria-label="Putar audio ayat">
                                <i class="bi bi-play-circle"></i>
                            </button>
                            <button onclick="toggleBookmark(${currentSurah.nomor}, ${verse.nomorAyat})" 
                                    class="bookmark-btn ${isBookmarked ? 'active' : ''}" 
                                    aria-label="${isBookmarked ? 'Hapus bookmark' : 'Simpan bookmark'}">
                                <i class="bi bi-bookmark${isBookmarked ? '-fill' : ''}"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setupAudioControls() {
            // Play/Pause full surah
            playButton.onclick = () => {
                if (isSurahPlaying) {
                    audioPlayer.pause();
                    isSurahPlaying = false;
                } else {
                    // Stop verse audio if playing
                    if (currentVerseAudio) {
                        currentVerseAudio.pause();
                        currentVerseAudio.currentTime = 0;
                        currentVerseAudio = null;
                        resetVerseButtons();
                        removeActiveVerseHighlight();
                    }

                    if (!audioPlayer.src || audioPlayer.src !== currentSurah.audioFull['05']) {
                        audioPlayer.src = currentSurah.audioFull['05'];
                    }
                    
                    audioPlayer.play().then(() => {
                        isSurahPlaying = true;
                        updatePlayButton(true);
                    }).catch(error => {
                        console.error('Error playing audio:', error);
                        alert('Tidak dapat memutar audio. Pastikan koneksi internet stabil.');
                    });
                }
                updatePlayButton(isSurahPlaying);
            };

            // Reset all audio
            resetButton.onclick = () => {
                // Add rotation animation
                resetButton.style.transform = 'rotate(360deg)';
                resetButton.style.transition = 'transform 0.5s ease';
                
                // Stop all audio
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
                isSurahPlaying = false;
                isAutoPlayMode = false;
                currentVerseIndex = -1;
                
                if (currentVerseAudio) {
                    currentVerseAudio.pause();
                    currentVerseAudio.currentTime = 0;
                    currentVerseAudio = null;
                }
                
                resetVerseButtons();
                removeActiveVerseHighlight();
                updatePlayButton(false);
                
                // Reset animation
                setTimeout(() => {
                    resetButton.style.transform = 'rotate(0deg)';
                }, 500);
            };

            // Previous verse button
            prevVerseBtn.onclick = () => {
                if (currentVerseIndex > 0) {
                    playVerseByIndex(currentVerseIndex - 1);
                } else if (currentVerseIndex === -1 && currentSurah && currentSurah.ayat) {
                    // If no verse is playing, start from the last verse
                    playVerseByIndex(currentSurah.ayat.length - 1);
                }
            };

            // Next verse button
            nextVerseBtn.onclick = () => {
                if (currentSurah && currentSurah.ayat) {
                    if (currentVerseIndex < currentSurah.ayat.length - 1) {
                        playVerseByIndex(currentVerseIndex + 1);
                    } else if (currentVerseIndex === -1) {
                        // If no verse is playing, start from the first verse
                        playVerseByIndex(0);
                    }
                }
            };

            audioPlayer.onended = () => {
                isSurahPlaying = false;
                updatePlayButton(false);
            };
            
            audioPlayer.onerror = (error) => {
                console.error('Audio error:', error);
                isSurahPlaying = false;
                updatePlayButton(false);
                alert('Error memutar audio. Coba lagi nanti.');
            };
        }

        function playVerse(verseNumber, verseIndex = null) {
            if (!currentSurah || !currentSurah.ayat) return;
            
            // Find verse index if not provided
            if (verseIndex === null) {
                verseIndex = currentSurah.ayat.findIndex(v => v.nomorAyat === verseNumber);
                if (verseIndex === -1) return;
            }
            
            playVerseByIndex(verseIndex);
        }

        function playVerseByIndex(verseIndex) {
            if (!currentSurah || !currentSurah.ayat || verseIndex < 0 || verseIndex >= currentSurah.ayat.length) {
                return;
            }
            
            const verse = currentSurah.ayat[verseIndex];
            const button = document.querySelector(`button[data-verse-index="${verseIndex}"]`);
            const verseCard = document.getElementById(`verse-${verse.nomorAyat}`);
            
            if (!verse || !button || !verseCard) return;

            // Stop surah audio if playing
            if (isSurahPlaying) {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
                isSurahPlaying = false;
                updatePlayButton(false);
            }

            // Stop previous verse audio if playing
            if (currentVerseAudio) {
                currentVerseAudio.pause();
                currentVerseAudio.currentTime = 0;
            }

            // Reset all buttons and highlights
            resetVerseButtons();
            removeActiveVerseHighlight();

            // Set current verse index
            currentVerseIndex = verseIndex;
            
            // Highlight current verse card
            verseCard.classList.add('active');
            
            // Scroll to verse
            verseCard.scrollIntoView({ behavior: 'smooth', block: 'center' });

            // Play the verse audio
            currentVerseAudio = new Audio(verse.audio['05']);
            currentVerseAudio.play().then(() => {
                updateVerseAudioButton(button, true);
                isAutoPlayMode = true;
            }).catch(error => {
                console.error('Error playing verse audio:', error);
                updateVerseAudioButton(button, false);
                verseCard.classList.remove('active');
                currentVerseIndex = -1;
            });

            // When verse audio ends, play next verse automatically
            currentVerseAudio.onended = () => {
                updateVerseAudioButton(button, false);
                verseCard.classList.remove('active');
                
                // Auto play next verse if available
                if (isAutoPlayMode && currentVerseIndex < currentSurah.ayat.length - 1) {
                    setTimeout(() => {
                        playVerseByIndex(currentVerseIndex + 1);
                    }, 500); // Delay before playing next verse
                } else {
                    currentVerseIndex = -1;
                    isAutoPlayMode = false;
                }
            };
            
            currentVerseAudio.onerror = () => {
                updateVerseAudioButton(button, false);
                verseCard.classList.remove('active');
                currentVerseIndex = -1;
                isAutoPlayMode = false;
                alert('Tidak dapat memutar audio ayat. Coba lagi nanti.');
            };
        }

        function updatePlayButton(isPlaying) {
            playButton.innerHTML = isPlaying ? 
                '<i class="bi bi-pause-fill fs-4"></i>' : 
                '<i class="bi bi-play-fill fs-4"></i>';
        }

        function resetVerseButtons() {
            document.querySelectorAll('.verse-audio-btn').forEach(button => {
                button.classList.remove('playing');
                button.innerHTML = '<i class="bi bi-play-circle"></i>';
            });
        }

        function removeActiveVerseHighlight() {
            document.querySelectorAll('.verse-card').forEach(card => {
                card.classList.remove('active');
            });
        }

        function updateVerseAudioButton(button, isPlaying) {
            if (!button) return;
            
            if (isPlaying) {
                button.classList.add('playing');
                button.innerHTML = '<i class="bi bi-pause-circle"></i>';
            } else {
                button.classList.remove('playing');
                button.innerHTML = '<i class="bi bi-play-circle"></i>';
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `
                <div class="d-flex align-items-center">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span>${message}</span>
                </div>
            `;
            document.body.appendChild(notification);

            setTimeout(() => {
                if (notification.parentNode) {
                    notification.style.opacity = '0';
                    notification.style.transform = 'translateX(100%)';
                    setTimeout(() => {
                        if (notification.parentNode) {
                            document.body.removeChild(notification);
                        }
                    }, 300);
                }
            }, 2700);
        }

        function checkIfBookmarked(surahNumber, verseNumber) {
            try {
                const bookmarks = JSON.parse(localStorage.getItem('quranBookmarks') || '[]');
                return bookmarks.some(b => b.surahNumber === surahNumber && b.verseNumber === verseNumber);
            } catch (error) {
                console.error('Error checking bookmark:', error);
                return false;
            }
        }

        function toggleBookmark(surahNumber, verseNumber) {
            try {
                const verse = currentSurah.ayat[verseNumber - 1];
                let bookmarks = JSON.parse(localStorage.getItem('quranBookmarks') || '[]');

                const isBookmarked = checkIfBookmarked(surahNumber, verseNumber);

                if (isBookmarked) {
                    bookmarks = bookmarks.filter(b => !(b.surahNumber === surahNumber && b.verseNumber === verseNumber));
                    showNotification('Ayat dihapus dari Bookmark');
                } else {
                    bookmarks.push({
                        surahNumber,
                        verseNumber,
                        surahName: currentSurah.namaLatin,
                        arabicText: verse.teksArab,
                        translation: verse.teksIndonesia
                    });
                    showNotification('Ayat disimpan di Bookmark');
                }

                localStorage.setItem('quranBookmarks', JSON.stringify(bookmarks));

                // Update bookmark icon
                const bookmarkButton = document.querySelector(`button[onclick="toggleBookmark(${surahNumber}, ${verseNumber})"]`);
                if (bookmarkButton) {
                    if (isBookmarked) {
                        bookmarkButton.classList.remove('active');
                        bookmarkButton.innerHTML = '<i class="bi bi-bookmark"></i>';
                        bookmarkButton.setAttribute('aria-label', 'Simpan bookmark');
                    } else {
                        bookmarkButton.classList.add('active');
                        bookmarkButton.innerHTML = '<i class="bi bi-bookmark-fill"></i>';
                        bookmarkButton.setAttribute('aria-label', 'Hapus bookmark');
                    }
                }
            } catch (error) {
                console.error('Error toggling bookmark:', error);
                showNotification('Gagal menyimpan bookmark');
            }
        }

        // Search functionality
        searchVerse.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();
            if (!currentSurah || !currentSurah.ayat) return;
            
            if (searchTerm === '') {
                renderVerses(currentSurah.ayat);
                return;
            }
            
            const filteredVerses = currentSurah.ayat.filter(verse => 
                verse.teksIndonesia.toLowerCase().includes(searchTerm) ||
                verse.teksLatin.toLowerCase().includes(searchTerm) ||
                verse.teksArab.includes(searchTerm) ||
                verse.nomorAyat.toString().includes(searchTerm)
            );
            renderVerses(filteredVerses);
        });

        // Stop audio when leaving page
        backButton.addEventListener('click', () => {
            if (audioPlayer) {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
            }
            if (currentVerseAudio) {
                currentVerseAudio.pause();
                currentVerseAudio = null;
            }
        });

        function scrollToVerse(verseNumber) {
            const verseElement = document.getElementById(`verse-${verseNumber}`);
            if (verseElement) {
                verseElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // Highlight briefly
                verseElement.style.backgroundColor = 'var(--secondary-color)';
                setTimeout(() => {
                    verseElement.style.backgroundColor = '';
                }, 2000);
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Prevent shortcuts in input fields
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            switch(e.key) {
                case ' ':
                    // Spacebar to play/pause current verse or surah
                    e.preventDefault();
                    if (currentVerseAudio) {
                        if (currentVerseAudio.paused) {
                            currentVerseAudio.play();
                        } else {
                            currentVerseAudio.pause();
                        }
                    } else if (audioPlayer) {
                        if (audioPlayer.paused) {
                            audioPlayer.play();
                        } else {
                            audioPlayer.pause();
                        }
                    }
                    break;
                case 'ArrowLeft':
                    // Left arrow for previous verse
                    e.preventDefault();
                    prevVerseBtn.click();
                    break;
                case 'ArrowRight':
                    // Right arrow for next verse
                    e.preventDefault();
                    nextVerseBtn.click();
                    break;
                case 'r':
                case 'R':
                    // R key to reset
                    e.preventDefault();
                    resetButton.click();
                    break;
            }
        });

        // Initial load
        fetchSurahDetails();
        
        // Handle browser back/forward navigation
        window.addEventListener('popstate', () => {
            fetchSurahDetails();
        });
    </script>
</body>
</html>
